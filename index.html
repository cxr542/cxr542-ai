<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="cxr542-hub — AI로 만든 서비스·실험·취미·아이디어를 카테고리별로 모은 개인 포털"
    />
    <title>cxr542-hub — 김윤형</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Sora:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/glass.css" />
    <link rel="stylesheet" href="styles/layout-shell.css" />
  </head>
  <body class="hub-tms">
    <a class="skip-link" href="#hub-panel-body">본문으로 건너뛰기</a>

    <div class="hub-shell">
      <aside class="hub-sidebar" id="hub-sidebar" aria-label="카테고리 메뉴"></aside>

      <div class="hub-main">
        <div class="hub-toolbar">
          <label class="visually-hidden" for="hub-search">검색</label>
          <input
            type="search"
            id="hub-search"
            placeholder="이름, 태그, 설명 검색…"
            autocomplete="off"
          />
          <span class="hub-route-hint" id="hub-route-hint" aria-live="polite"></span>
          <button type="button" class="btn btn--ghost" id="hub-category-edit-toggle">
            항목·메뉴 관리
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            id="hub-category-export"
            title="category-overrides.json"
            hidden
          >
            카테고리 JSON
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            id="hub-visibility-export"
            title="hub-visibility.json"
            hidden
          >
            숨김 JSON
          </button>
        </div>
        <nav class="hub-item-tabs" id="hub-item-tabs" aria-label="항목" hidden></nav>
        <nav class="hub-panel-tabs" id="hub-panel-tabs" aria-label="소개 또는 앱" hidden>
          <button type="button" class="hub-panel-tab is-active" data-panel="intro">소개</button>
          <button type="button" class="hub-panel-tab" data-panel="app">접속 / 앱</button>
        </nav>
        <div class="hub-panel-body" id="hub-panel-body" tabindex="-1"></div>
      </div>
    </div>

    <div class="hub-modal-backdrop" id="nav-labels-modal" hidden>
      <div class="hub-modal" role="dialog" aria-labelledby="nav-labels-title">
        <h3 id="nav-labels-title">사이드바 메뉴</h3>
        <p class="hub-summary" style="margin: 0 0 0.75rem; font-size: 0.8125rem">
          이름 변경 · 「메뉴 숨김」으로 사이드바에서 삭제
        </p>
        <form id="nav-labels-form"></form>
        <div class="hub-modal__actions">
          <button type="button" class="btn btn--secondary" id="nav-labels-save">적용</button>
          <button type="button" class="btn btn--ghost" id="nav-labels-export">메뉴 JSON</button>
          <button type="button" class="btn btn--ghost" id="nav-labels-reset">이름 초기화</button>
          <button type="button" class="btn btn--ghost" id="nav-labels-close">닫기</button>
        </div>
      </div>
    </div>

    <div class="hub-modal-backdrop" id="hidden-restore-modal" hidden>
      <div class="hub-modal" role="dialog" aria-labelledby="hidden-restore-title">
        <h3 id="hidden-restore-title">숨긴 항목·메뉴</h3>
        <div id="hidden-restore-body"></div>
        <div class="hub-modal__actions">
          <button type="button" class="btn btn--ghost" id="hidden-restore-close">닫기</button>
        </div>
      </div>
    </div>

    <footer class="site-footer" style="display: none" aria-hidden="true">
      <p class="updated-note" id="catalog-updated"></p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/hub-main.js?v=20260530"></script>
  </body>
</html>
