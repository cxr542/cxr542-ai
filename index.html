<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="cxr542-hub — AI로 만든 서비스·실험·취미·아이디어를 카테고리별로 모은 개인 포털"
    />
    <title>cxr542-hub — 김윤형</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Sora:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/glass.css" />
    <link rel="stylesheet" href="styles/layout-shell.css" />
  </head>
  <body class="hub-tms">
    <a class="skip-link" href="#hub-panel-body">본문으로 건너뛰기</a>

    <div class="hub-shell">
      <aside class="hub-sidebar" id="hub-sidebar" aria-label="카테고리 메뉴"></aside>

      <div class="hub-main">
        <div class="hub-toolbar">
          <label class="visually-hidden" for="hub-search">검색</label>
          <input
            type="search"
            id="hub-search"
            placeholder="이름, 태그, 설명 검색…"
            autocomplete="off"
          />
          <span class="hub-route-hint" id="hub-route-hint" aria-live="polite"></span>
          <button type="button" class="btn btn--secondary" id="hub-quick-idea-open" title="아이디어뱅크에 빠르게 등록">
            ＋ 아이디어
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            id="hub-ideas-export"
            title="ideas.json"
            hidden
          >
            ideas JSON
          </button>
          <button type="button" class="btn btn--ghost" id="hub-category-edit-toggle">
            항목·메뉴 관리
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            id="hub-category-export"
            title="category-overrides.json"
            hidden
          >
            카테고리 JSON
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            id="hub-visibility-export"
            title="hub-visibility.json"
            hidden
          >
            숨김 JSON
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            id="hub-intro-export"
            title="intro-overrides.json"
            hidden
          >
            소개 JSON
          </button>
        </div>
        <nav class="hub-subcategory-chips" id="hub-subcategory-chips" aria-label="하위 분류" hidden></nav>
        <nav class="hub-item-tabs" id="hub-item-tabs" aria-label="항목" hidden></nav>
        <nav class="hub-panel-tabs" id="hub-panel-tabs" aria-label="소개 또는 앱" hidden>
          <button type="button" class="hub-panel-tab is-active" data-panel="intro">소개</button>
          <button type="button" class="hub-panel-tab" data-panel="app">접속 / 앱</button>
        </nav>
        <div class="hub-panel-body" id="hub-panel-body" tabindex="-1"></div>
      </div>
    </div>

    <div class="hub-modal-backdrop" id="nav-labels-modal" hidden>
      <div class="hub-modal" role="dialog" aria-labelledby="nav-labels-title">
        <h3 id="nav-labels-title">사이드바 메뉴</h3>
        <p class="hub-summary" style="margin: 0 0 0.75rem; font-size: 0.8125rem">
          이름 변경 · 「메뉴 숨김」으로 사이드바에서 삭제
        </p>
        <form id="nav-labels-form"></form>
        <div class="hub-modal__actions">
          <button type="button" class="btn btn--secondary" id="nav-labels-save">적용</button>
          <button type="button" class="btn btn--ghost" id="nav-labels-export">메뉴 JSON</button>
          <button type="button" class="btn btn--ghost" id="nav-labels-reset">이름 초기화</button>
          <button type="button" class="btn btn--ghost" id="nav-labels-close">닫기</button>
        </div>
      </div>
    </div>

    <div class="hub-modal-backdrop" id="quick-idea-modal" hidden>
      <div class="hub-modal hub-modal--wide" role="dialog" aria-labelledby="quick-idea-title">
        <h3 id="quick-idea-title">아이디어 빠른 등록</h3>
        <p class="hub-summary" style="margin: 0 0 0.75rem; font-size: 0.8125rem">
          브라우저에 임시 저장됩니다. 확정 시 <strong>ideas JSON</strong>을
          <code>ai/ideas.json</code>에 넣고 <code>npm run build:hub</code> 하세요.
        </p>
        <form id="quick-idea-form">
          <label class="hub-intro-field"
            >제목 (필수)<input type="text" name="title" required placeholder="예: 마라톤 기록" autocomplete="off"
          /></label>
          <label class="hub-intro-field"
            >한 줄 요약 (필수)<textarea name="summary" rows="2" required placeholder="무엇을 위한 아이디어인지"></textarea
          ></label>
          <label class="hub-intro-field"
            >다음 행동<textarea name="nextAction" rows="2" placeholder="가장 작은 다음 한 걸음"></textarea
          ></label>
          <label class="hub-intro-field"
            >문제<textarea name="problem" rows="2" placeholder="지금 불편한 점"></textarea
          ></label>
          <label class="hub-intro-field"
            >가설<textarea name="hypothesis" rows="2" placeholder="이렇게 하면 나아질 것"></textarea
          ></label>
          <label class="hub-intro-field"
            >최소 실험<textarea name="experiment" rows="2" placeholder="1~2시간 안에 할 수 있는 것"></textarea
          ></label>
          <label class="hub-intro-field"
            >성공 기준<textarea name="success" rows="2" placeholder="이게 되면 study/hobby로 승격"></textarea
          ></label>
          <label class="hub-intro-field"
            >태그 (쉼표)<input type="text" name="tags" placeholder="product, Running"
          /></label>
        </form>
        <div class="hub-modal__actions">
          <button type="button" class="btn btn--secondary" id="quick-idea-save">저장 · 아이디어뱅크 열기</button>
          <button type="button" class="btn btn--ghost" id="quick-idea-close">닫기</button>
        </div>
      </div>
    </div>

    <div class="hub-modal-backdrop" id="hidden-restore-modal" hidden>
      <div class="hub-modal" role="dialog" aria-labelledby="hidden-restore-title">
        <h3 id="hidden-restore-title">숨긴 항목·메뉴</h3>
        <div id="hidden-restore-body"></div>
        <div class="hub-modal__actions">
          <button type="button" class="btn btn--ghost" id="hidden-restore-close">닫기</button>
        </div>
      </div>
    </div>

    <footer class="site-footer" style="display: none" aria-hidden="true">
      <p class="updated-note" id="catalog-updated"></p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/hub-main.js?v=study-sub"></script>
  </body>
</html>
